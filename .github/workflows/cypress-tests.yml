name: Cypress Tests

on: 
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  cypress-run:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      
      - name: Install dependencies
        run: npm ci
      
      - name: Run API Tests (Harness)
        run: npm run harness:verbose
        continue-on-error: true
      
      - name: Run Cypress Tests on Cloud
        uses: cypress-io/github-action@v7
        with:
          # Cypress Cloud configuration - record only when key is available
          record: ${{ secrets.CYPRESS_RECORD_KEY != '' }}
          parallel: false
          browser: electron
          # Run both BDD and UI tests
          spec: 'cypress/e2e/**/*.feature,cypress/e2e/**/*.cy.ts'
        env:
          # Cypress Cloud project ID
          CYPRESS_PROJECT_ID: ta3u8r
          # Recording key for Cypress Cloud (set in GitHub repo → Settings → Secrets → Actions)
          CYPRESS_RECORD_KEY: ${{ secrets.CYPRESS_RECORD_KEY }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          CHATBOT_TOKEN: ${{ secrets.CHATBOT_TOKEN || '' }}
          CI: true
      
      - name: Upload Cypress Videos
        uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: cypress-videos
          path: cypress/videos
          retention-days: 7
      
      - name: Upload Cypress Screenshots
        uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: cypress-screenshots
          path: cypress/screenshots
          retention-days: 7
