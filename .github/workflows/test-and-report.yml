name: Test & Generate Allure Report

on:
  push:
    branches:
      - main
      - develop
  pull_request:
    branches:
      - main
      - develop
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    
    strategy:
      matrix:
        node-version: [18.x]
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: 'npm'
      
      - name: Install dependencies
        run: npm ci
      
      - name: Run linting
        run: npm run lint
        continue-on-error: true
      
      - name: Run harness tests
        run: npm run harness
        env:
          BASE_URL: ${{ secrets.BASE_URL || 'https://2ndround.sandb0x.run' }}
          CHATBOT_TOKEN: ${{ secrets.CHATBOT_TOKEN || 'kwpw-fees-19bg-fm6z-svqr-d29p8n' }}
          CHATBOT_SESSION_ID: ${{ secrets.CHATBOT_SESSION_ID || '5e0ec23e76d719aa' }}
        continue-on-error: true
      
      - name: Generate Allure Report
        if: always()
        run: npm run report
        continue-on-error: true
      
      - name: Upload test results as artifacts
        if: always()
        uses: actions/upload-artifact@v3
        with:
          name: test-results
          path: tests/harness/test-results/
          retention-days: 30
      
      - name: Upload Allure report as artifact
        if: always()
        uses: actions/upload-artifact@v3
        with:
          name: allure-report
          path: allure-report/
          retention-days: 90
      
      - name: Deploy Allure Report to GitHub Pages
        if: github.ref == 'refs/heads/main' && always()
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./allure-report
          destination_dir: reports/${{ github.run_number }}
      
      - name: Comment PR with report link
        if: github.event_name == 'pull_request' && always()
        uses: actions/github-script@v7
        with:
          script: |
            const reportUrl = `https://${{ github.repository_owner }}.github.io/${{ github.event.repository.name }}/reports/${{ github.run_number }}/`;
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: `📊 **Test Report Available**\n\n[View Allure Report](${reportUrl})\n\n**Run #${{ github.run_number }}**`
            });
